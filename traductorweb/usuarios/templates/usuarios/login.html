{% extends 'base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="card shadow p-4 mx-auto" style="max-width: 400px;">
    <h2 class="text-center">🔑 Iniciar Sesión</h2>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Introduce tu usuario" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <div class="input-group">
                <input type="password" name="password" class="form-control" id="login-password" placeholder="Introduce tu contraseña" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('login-password')">👁</button>
            </div>
        </div>
        

        {% if form.errors %}
            <div class="alert alert-danger">
                ❌ Usuario o contraseña incorrectos. Inténtalo de nuevo.
            </div>
        {% endif %}

        <button type="submit" class="btn btn-primary w-100">🔓 Iniciar Sesión</button>
    </form>

    <p class="text-center mt-3">
        ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a>
    </p>
</div>
{% endblock %}
